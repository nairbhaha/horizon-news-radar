name: Daily Horizon Summary

on:
  # schedule:
  #   - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Topics of interest (comma-separated, e.g. "AI, Python, Rust")'
        required: true
        default: 'AI, Programming, Technology'
        type: string
      hours:
        description: 'Time window in hours'
        required: false
        default: '48'
        type: choice
        options:
          - '24'
          - '48'
          - '72'
          - '168'

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours ${{ github.event.inputs.hours || '48' }} --topics "${{ github.event.inputs.topics }}"

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Copy summary to news/ folder
        run: |
          mkdir -p news
          cp docs/_posts/${{ env.DATE }}-summary-en.md news/ 2>/dev/null || true
          cp docs/_posts/${{ env.DATE }}-summary-zh.md news/ 2>/dev/null || true

      - name: Commit and push to main
        run: |
          git config user.name "nairbhaha"
          git config user.email "nairbhaha@users.noreply.github.com"
          git add news/
          git diff --cached --quiet || git commit -m "📝 Daily Summary: ${{ env.DATE }}"
          git push origin main
